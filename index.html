<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>qzwtrp</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:'Courier New',monospace;overflow:hidden;height:100vh;display:flex;align-items:center;justify-content:center}
.grid{position:fixed;width:200%;height:200%;background-image:linear-gradient(rgba(0,255,255,.1)1px,transparent 1px),linear-gradient(90deg,rgba(0,255,255,.1)1px,transparent 1px);background-size:40px 40px;transform:perspective(500px)rotateX(60deg)translateY(-100px)translateZ(-100px);animation:grid-move 2s linear infinite;opacity:.5}
@keyframes grid-move{0%{transform:perspective(500px)rotateX(60deg)translateY(0)translateZ(-100px)}100%{transform:perspective(500px)rotateX(60deg)translateY(40px)translateZ(-100px)}}
.container{position:relative;z-index:10;text-align:center;padding:2rem}
.name{font-size:clamp(3rem,10vw,8rem);font-weight:900;letter-spacing:-.05em;text-transform:uppercase;line-height:.9;position:relative;display:inline-block}
.name .glitch{color:#fff;position:relative}
.name .glitch::before,.name .glitch::after{content:attr(data-text);position:absolute;top:0;left:0;width:100%;height:100%}
.name .glitch::before{color:#ff0040;clip-path:inset(0 0 50% 0);animation:glitch-top 2s infinite linear alternate-reverse}
.name .glitch::after{color:#00ffff;clip-path:inset(50% 0 0 0);animation:glitch-bottom 2s infinite linear alternate-reverse}
@keyframes glitch-top{0%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-2px)}80%{transform:translateX(2px)}100%{transform:translateX(0)}}
@keyframes glitch-bottom{0%{transform:translateX(0)}20%{transform:translateX(5px)}40%{transform:translateX(-5px)}60%{transform:translateX(2px)}80%{transform:translateX(-2px)}100%{transform:translateX(0)}}
.title{color:#00ffff;font-size:clamp(1rem,3vw,1.5rem);margin-top:1rem;letter-spacing:.3em;text-transform:uppercase;animation:glow 2s ease-in-out infinite alternate}
@keyframes glow{from{text-shadow:0 0 5px #00ffff,0 0 10px #00ffff}to{text-shadow:0 0 10px #00ffff,0 0 20px #00ffff,0 0 40px #00ffff}}
.links{margin-top:3rem;display:flex;gap:2rem;justify-content:center;flex-wrap:wrap}
.links a{color:#fff;text-decoration:none;font-size:.9rem;letter-spacing:.2em;text-transform:uppercase;position:relative;padding:.5rem 0;transition:color .3s}
.links a::after{content:'';position:absolute;bottom:0;left:0;width:0;height:1px;background:#00ffff;transition:width .3s}
.links a:hover{color:#00ffff}
.links a:hover::after{width:100%}
.badge{display:inline-block;border:1px solid rgba(0,255,255,.3);padding:.4rem 1rem;margin-top:2rem;font-size:.8rem;color:#888;letter-spacing:.1em}
.scanline{position:fixed;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.1)2px,rgba(0,0,0,.1)4px);pointer-events:none;z-index:100}
</style>
</head>
<body>
<div class="grid"></div>
<div class="scanline"></div>
<div class="container">
  <div class="name">
    <span class="glitch" data-text="QZWTRP">QZWTRP</span>
  </div>
  <div class="title">Developer // Hacker // Creator</div>
  <div class="links">
    <a href="https://github.com/qzwtrp/repo-stat">Repo Stat</a>
    <a href="https://github.com/qzwtrp">GitHub</a>
  </div>
  <div class="badge">ARCH LINUX | PYTHON | FISH | TERMINAL</div>
</div>
<script>
// subtle mouse parallax
document.addEventListener('mousemove',e=>{
  const x=(e.clientX/window.innerWidth-.5)*10;
  const y=(e.clientY/window.innerHeight-.5)*10;
  document.querySelector('.grid').style.transform=`perspective(500px) rotateX(60deg) translateY(${y}px) translateZ(${-100+x}px)`;
});
</script>
</body>
</html>
