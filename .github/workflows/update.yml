name: Update Profile

on:
  schedule:
    - cron: "0 6 * * *"  # 06:00 UTC every day
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate README
        run: python update_readme.py

      - name: Commit and push
        run: |
          git config user.name "qzwtrp"
          git config user.email "qzwtrp@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: daily update $(date -u +%Y-%m-%d)"
          git push
