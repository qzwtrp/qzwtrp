<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#001a1a"/>
    </linearGradient>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff0040">
        <animate attributeName="stop-color" values="#ff0040;#00ffff;#ff00ff;#ff0040" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#00ffff">
        <animate attributeName="stop-color" values="#00ffff;#ff00ff;#ff0040;#00ffff" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="rgba(0,255,255,.08)" stroke-width="1">
    <animate attributeName="opacity" values=".3;.6;.3" dur="3s" repeatCount="indefinite"/>
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="100" y1="0" x2="100" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/>
    <line x1="500" y1="0" x2="500" y2="300"/>
    <line x1="700" y1="0" x2="700" y2="300"/>
    <line x1="900" y1="0" x2="900" y2="300"/>
    <line x1="1100" y1="0" x2="1100" y2="300"/>
  </g>

  <!-- Corner brackets -->
  <path d="M 20,20 L 20,5 L 35,5" fill="none" stroke="#00ffff" stroke-width="2">
    <animate attributeName="stroke-opacity" values="1;.3;1" dur="2s" repeatCount="indefinite"/>
  </path>
  <path d="M 1180,20 L 1180,5 L 1165,5" fill="none" stroke="#00ffff" stroke-width="2">
    <animate attributeName="stroke-opacity" values="1;.3;1" dur="2s" repeatCount="indefinite"/>
  </path>
  <path d="M 20,280 L 20,295 L 35,295" fill="none" stroke="#00ffff" stroke-width="2">
    <animate attributeName="stroke-opacity" values="1;.3;1" dur="2s" repeatCount="indefinite"/>
  </path>
  <path d="M 1180,280 L 1180,295 L 1165,295" fill="none" stroke="#00ffff" stroke-width="2">
    <animate attributeName="stroke-opacity" values="1;.3;1" dur="2s" repeatCount="indefinite"/>
  </path>

  <!-- Main text -->
  <text x="50%" y="50%" text-anchor="middle" dominant-baseline="middle"
        font-family="monospace" font-size="80" font-weight="900"
        fill="url(#neon)" filter="url(#glow)"
        letter-spacing="10">
    QZWTRP
  </text>

  <!-- Scan line -->
  <line x1="0" y1="0" x2="1200" y2="0" stroke="rgba(0,255,255,.3)" stroke-width="2">
    <animate attributeName="y1" values="0;300;0" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="0;300;0" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0;.5;0" dur="3s" repeatCount="indefinite"/>
  </line>

  <!-- Bottom tech stack -->
  <text x="50%" y="280" text-anchor="middle"
        font-family="monospace" font-size="14"
        fill="#00ffff" letter-spacing="3">
    <tspan opacity=".7">ARCH LINUX</tspan>
    <tspan opacity=".5"> // </tspan>
    <tspan opacity=".7">PYTHON</tspan>
    <tspan opacity=".5"> // </tspan>
    <tspan opacity=".7">FISH</tspan>
    <tspan opacity=".5"> // </tspan>
    <tspan opacity=".7">TERMINAL</tspan>
  </text>
</svg>
